name: Release

# npm publish pipeline driven by Changesets.
#
# - Opens/updates the "Version Packages" PR when changesets are pending.
# - Once that PR is merged, publishes updated packages to npm.
#
# Native installers (dmg/exe) and showcase tarballs are handled by the
# separate `release-installers.yml` workflow, which is triggered manually
# so that a fresh set of installer/asset builds can be attached to an
# existing Release without depending on npm publish state.

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: macos-latest
    environment: npm
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Full history so Changesets can generate changelogs.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: |
          npm i -g corepack@latest --force
          corepack enable
          pnpm install

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
