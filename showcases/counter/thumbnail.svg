<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1d2427"/>
  <rect x="1.5" y="1.5" width="1197" height="672" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- flat counter stepper illustration -->
  <rect x="380" y="220" width="440" height="180" rx="6" fill="#2c2e3b" stroke="rgba(255,255,255,0.1)"/>
  <text x="600" y="268" text-anchor="middle" fill="#a7b6c2" font-size="18" font-weight="600" letter-spacing="3" font-family="Menlo, monospace">COUNTER</text>
  <text x="600" y="352" text-anchor="middle" fill="#f5f8fa" font-size="72" font-weight="600" font-family="Menlo, monospace">42</text>

  <!-- decrement button -->
  <rect x="452" y="440" width="132" height="52" rx="3" fill="#394b59" stroke="rgba(255,255,255,0.1)"/>
  <rect x="500" y="463" width="36" height="6" fill="#f5f8fa"/>

  <!-- increment button (primary) -->
  <rect x="616" y="440" width="132" height="52" rx="3" fill="rgba(19,124,189,0.16)" stroke="rgba(255,255,255,0.1)"/>
  <rect x="664" y="463" width="36" height="6" fill="#48aff0"/>
  <rect x="679" y="448" width="6" height="36" fill="#48aff0"/>

  <!-- tick marks -->
  <rect x="452" y="188" width="2" height="12" fill="#608291"/>
  <rect x="526" y="188" width="2" height="12" fill="#608291"/>
  <rect x="600" y="182" width="2" height="18" fill="#48aff0"/>
  <rect x="674" y="188" width="2" height="12" fill="#608291"/>
  <rect x="748" y="188" width="2" height="12" fill="#608291"/>

  <!-- app name -->
  <text x="56" y="619" fill="#a7b6c2" font-size="28" font-weight="600" letter-spacing="4" font-family="Menlo, monospace">COUNTER</text>
</svg>
