<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#1d2427"/>
  <rect x="0.5" y="0.5" width="1199" height="674" stroke="rgba(255,255,255,0.1)"/>

  <!-- Flat accent illustration: two-pane notes window, list + editor split by a hairline -->
  <g>
    <rect x="330" y="120" width="540" height="360" rx="6" fill="#2c2e3b" stroke="rgba(255,255,255,0.1)"/>
    <!-- hairline pane split -->
    <line x1="510.5" y1="120.5" x2="510.5" y2="479.5" stroke="rgba(255,255,255,0.1)"/>

    <!-- list pane rows -->
    <rect x="346" y="140" width="60" height="8" rx="2" fill="#a7b6c2"/>
    <rect x="342" y="166" width="156" height="44" rx="3" fill="rgba(9,71,113,0.6)"/>
    <rect x="354" y="178" width="96" height="8" rx="2" fill="#f5f8fa"/>
    <rect x="354" y="192" width="120" height="6" rx="2" fill="#608291"/>
    <rect x="354" y="232" width="84" height="8" rx="2" fill="#a7b6c2"/>
    <rect x="354" y="246" width="112" height="6" rx="2" fill="#608291"/>
    <rect x="354" y="286" width="104" height="8" rx="2" fill="#a7b6c2"/>
    <rect x="354" y="300" width="92" height="6" rx="2" fill="#608291"/>

    <!-- editor pane: markdown lines + accent cursor -->
    <rect x="530" y="140" width="72" height="8" rx="2" fill="#a7b6c2"/>
    <rect x="530" y="170" width="220" height="10" rx="2" fill="#48aff0"/>
    <rect x="530" y="200" width="304" height="8" rx="2" fill="#608291"/>
    <rect x="530" y="222" width="272" height="8" rx="2" fill="#608291"/>
    <rect x="530" y="244" width="296" height="8" rx="2" fill="#608291"/>
    <rect x="530" y="266" width="188" height="8" rx="2" fill="#608291"/>
    <rect x="530" y="304" width="240" height="8" rx="2" fill="#608291"/>
    <rect x="530" y="326" width="140" height="8" rx="2" fill="#608291"/>
    <rect x="676" y="322" width="3" height="16" fill="#48aff0"/>

    <!-- quiet buttons -->
    <rect x="530" y="432" width="92" height="26" rx="3" fill="rgba(19,124,189,0.16)" stroke="rgba(255,255,255,0.1)"/>
    <rect x="546" y="443" width="60" height="5" rx="2" fill="#48aff0"/>
    <rect x="634" y="432" width="92" height="26" rx="3" fill="#394b59" stroke="rgba(255,255,255,0.1)"/>
    <rect x="650" y="443" width="60" height="5" rx="2" fill="#a7b6c2"/>
  </g>

  <text x="48" y="627" fill="#a7b6c2" font-size="26" font-weight="600" letter-spacing="4" font-family="Menlo, monospace">CROSS-PLATFORM NOTES</text>
</svg>
