  <text x="500" y="400" fill="rgba(255,255,255,0.95)" font-size="72" font-weight="300" letter-spacing="4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-variant-numeric="tabular-nums">14:32:45</text>

