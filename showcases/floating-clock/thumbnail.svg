      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0f0f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="600" cy="337" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#667eea" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#667eea" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="600" cy="337" r="250" fill="url(#glow)"/>

  <!-- Clock widget preview -->
  <rect x="400" y="200" width="400" height="280" rx="20" fill="rgba(0,0,0,0.3)"/>
